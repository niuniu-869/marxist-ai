<p class='title1'>马克思致约·魏德迈</p>
<p class='date'>（1852年3月5日于伦敦）</p>
<br>
<br>

　　……至于讲到我，无论是发现现代社会中有阶级存在或发现各阶级间的斗争，都不是我的功劳。在我以前很久，资产阶级的历史学家就已叙述过阶级斗争的历史发展，资产阶级的经济学家也已对各个阶级作过经济上的分析。我的新贡献就是证明了下列几点：（1）<b>阶级的存在</b>仅仅同<b>生产发展的一定历史阶段</b>相联系；（2）阶级斗争必然要导致<b>无产阶级专政</b>；（3）这个专政不过是达到<b>消灭一切阶级</b>和进入<b>无阶级社会</b>的过渡……<br>
