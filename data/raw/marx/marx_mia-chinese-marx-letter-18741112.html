<p class='title1'>马克思致莫里斯·拉沙特尔</p>
<p class='date'>（1874年11月12日）</p>
<br>
<br>
<p align="right">1874年11月12日于伦敦</p>
<br>
亲爱的公民：<br>
<br>
　　直至今日，我才回复您9日的来信，因为我刚从阿姆斯特丹赶回来，我被叫到那里处理家庭事务。我已于10月15日开始继续工作，并完全重写了鲁瓦先生的剩余译稿。目前要抄写大部分稿件，但这项工作会进行得很快，印刷厂厂主下周就会收到第一封邮件。既然再不会有耽搁，您尽可以通告读者，很快就会提供后续分册。<br>
<br>
<p align="right">您忠诚的  卡尔·马克思</p>
<br>
<br>
